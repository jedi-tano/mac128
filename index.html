<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Table Example</title>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        .updated-strip { display: flex; gap: 10px; margin: 8px 0 14px; flex-wrap: wrap; }
        .updated-box {
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 10px;
            min-width: 210px;
            background: #fafafa;
        }
        .updated-zone { font-size: 12px; color: #444; }
        .updated-time { font-size: 14px; font-weight: 700; margin-top: 2px; }
        .filters { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .filters label { display: flex; flex-direction: column; font-size: 13px; gap: 4px; }
        .filters select { padding: 4px 8px; font-size: 13px; min-width: 180px; }
        table {
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
            cursor: pointer;
        }
        th:hover {
            background-color: #bbb;
        }
        tr:hover td { background-color: #f5f5f5; }
    </style>
</head>
<body>

    <h2>Chest Data Table</h2>

    <div class="updated-strip">
        <div class="updated-box">
            <div class="updated-zone">Updated (Singapore)</div>
            <div class="updated-time" id="updated-sg">-</div>
        </div>
        <div class="updated-box">
            <div class="updated-zone">Updated (Europe)</div>
            <div class="updated-time" id="updated-utc">-</div>
        </div>
        <div class="updated-box">
            <div class="updated-zone">Updated (PST)</div>
            <div class="updated-time" id="updated-la">-</div>
        </div>
    </div>

    <div class="filters">
        <label>From <select id="filter-from"><option value="">All</option></select></label>
        <label>Source <select id="filter-source"><option value="">All</option></select></label>
        <label style="justify-content:flex-end"><button id="reset-filters" style="padding:4px 12px;font-size:13px;margin-top:16px">Reset</button></label>
    </div>

    <div class="updated-strip" style="margin-top: 0; margin-bottom: 12px;">
        <div class="updated-box">
            <div class="updated-zone">Total Chest Number (Filtered)</div>
            <div class="updated-time" id="total-chest-number">0</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>From</th>
                <th id="source-header">Source Type</th>
                <th>Chest Number</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Data rows generated by JavaScript -->
        </tbody>
    </table>

    <p id="row-count"></p>

    <script src="data.js"></script>

    <script>
        const fallbackUpdatedIso = '2026-04-17T19:37:34-07:00';
        const latestDataIso =
            typeof rawDataLastUpdatedIso === 'string' && rawDataLastUpdatedIso
                ? rawDataLastUpdatedIso
                : fallbackUpdatedIso;
        const tbody = document.getElementById('data-table-body');
        const rowCount = document.getElementById('row-count');
        const sourceHeader = document.getElementById('source-header');
        const filterFrom = document.getElementById('filter-from');
        const filterSource = document.getElementById('filter-source');
        const totalChestNumber = document.getElementById('total-chest-number');
        const updatedUtc = document.getElementById('updated-utc');
        const updatedLa = document.getElementById('updated-la');
        const updatedSg = document.getElementById('updated-sg');
        let sourceSortAsc = true;

        function formatInZone(date, timeZone) {
            return new Intl.DateTimeFormat('en-US', {
                timeZone,
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZoneName: 'short'
            }).format(date);
        }

        function renderUpdatedTimes() {
            const updatedDate = new Date(latestDataIso);
            if (Number.isNaN(updatedDate.getTime())) {
                updatedUtc.textContent = '-';
                updatedLa.textContent = '-';
                updatedSg.textContent = '-';
                return;
            }
            updatedUtc.textContent = formatInZone(updatedDate, 'Europe/Berlin');
            updatedLa.textContent = formatInZone(updatedDate, 'America/Los_Angeles');
            updatedSg.textContent = formatInZone(updatedDate, 'Asia/Singapore');
        }

        // rawData is a pre-grouped JSON array produced by text_to_data_js.py
        // Each element: { from, source, chestNumber }
        const groupedRows = rawData;

        // Populate filter dropdowns with sorted unique values
        function unique(arr) { return [...new Set(arr)].filter(Boolean).sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'})); }
        unique(groupedRows.map(r => r.from)).forEach(v => filterFrom.add(new Option(v, v)));
        unique(groupedRows.map(r => r.source)).forEach(v => filterSource.add(new Option(v, v)));

        function getFilteredRows() {
            const f = filterFrom.value.toLowerCase();
            const s = filterSource.value.toLowerCase();
            return groupedRows.filter(row =>
                (!f || row.from.toLowerCase() === f) &&
                (!s || row.source.toLowerCase() === s)
            );
        }

        function renderTable() {
            const rows = getFilteredRows();
            tbody.innerHTML = '';
            rows.forEach(({ chestNumber, from, source }) => {
                const tr = document.createElement('tr');
                [from, source, chestNumber.toString()].forEach(text => {
                    const td = document.createElement('td');
                    td.textContent = text || '—';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            const total = rows.reduce((sum, row) => sum + row.chestNumber, 0);
            totalChestNumber.textContent = total.toString();
            rowCount.textContent = `${rows.length} groups | ${total} total chests.`;
        }

        function sortBySource() {
            groupedRows.sort((a, b) => {
                const result = a.source.localeCompare(b.source, undefined, { sensitivity: 'base' });
                return sourceSortAsc ? result : -result;
            });
            sourceHeader.textContent = `Source Type ${sourceSortAsc ? '▲' : '▼'}`;
            sourceSortAsc = !sourceSortAsc;
            renderTable();
        }

        sourceHeader.addEventListener('click', sortBySource);
        filterFrom.addEventListener('change', renderTable);
        filterSource.addEventListener('change', renderTable);
        document.getElementById('reset-filters').addEventListener('click', () => {
            filterFrom.value = '';
            filterSource.value = '';
            renderTable();
        });

        renderUpdatedTimes();
        renderTable();
    </script>

</body>
</html>
