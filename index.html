<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Table Example</title>
    <style>
        body { font-family: sans-serif; padding: 16px; }
        .filters { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .filters label { display: flex; flex-direction: column; font-size: 13px; gap: 4px; }
        .filters select { padding: 4px 8px; font-size: 13px; min-width: 180px; }
        table {
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
            cursor: pointer;
        }
        th:hover {
            background-color: #bbb;
        }
        tr:hover td { background-color: #f5f5f5; }
    </style>
</head>
<body>

    <h2>Chest Data Table</h2>

    <div class="filters">
        <label>Chest <select id="filter-chest"><option value="">All</option></select></label>
        <label>From <select id="filter-from"><option value="">All</option></select></label>
        <label>Source <select id="filter-source"><option value="">All</option></select></label>
        <label style="justify-content:flex-end"><button id="reset-filters" style="padding:4px 12px;font-size:13px;margin-top:16px">Reset</button></label>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Chest</th>
                <th>From</th>
                <th id="source-header">Source</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Data rows generated by JavaScript -->
        </tbody>
    </table>

    <p id="row-count"></p>

    <script src="data.js"></script>

    <script>
        const tbody = document.getElementById('data-table-body');
        const rowCount = document.getElementById('row-count');
        const sourceHeader = document.getElementById('source-header');
        const filterChest = document.getElementById('filter-chest');
        const filterFrom = document.getElementById('filter-from');
        const filterSource = document.getElementById('filter-source');
        let sourceSortAsc = true;

        function parseLine(line) {
            const rawTokens = line.replace(/\t/g, '')
                                  .split(',')
                                  .map(token => token.trim())
                                  .filter(Boolean);

            const fromIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('from:'));
            const sourceIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('source:'));
            if (fromIndex === -1 || sourceIndex === -1) {
                return null;
            }

            let chest = rawTokens.slice(0, fromIndex).join(', ');
            const firstFromValue = rawTokens[fromIndex].replace(/^from:/i, '').trim();
            const fromExtra = rawTokens.slice(fromIndex + 1, sourceIndex).join(', ');
            let from = [firstFromValue, fromExtra].filter(Boolean).join(', ').trim();

            const firstSourceValue = rawTokens[sourceIndex].replace(/^source:/i, '').trim();
            const tokensAfterSource = rawTokens.slice(sourceIndex + 1);

            // Reversed line: From/Source come first, chest name is after Source
            if (!chest && tokensAfterSource.length > 0) {
                chest = tokensAfterSource.join(', ');
                return { chest, from, source: firstSourceValue };
            }

            // Normal line
            let source = [firstSourceValue, ...tokensAfterSource].filter(Boolean).join(', ').trim();
            return { chest, from, source };
        }

        const allRows = rawData
            .split(/\r?\n/)
            .map(line => line.trim())
            .filter(Boolean)
            .map(parseLine)
            .filter(Boolean);

        // Populate filter dropdowns with sorted unique values
        function unique(arr) { return [...new Set(arr)].filter(Boolean).sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'})); }
        unique(allRows.map(r => r.chest)).forEach(v => filterChest.add(new Option(v, v)));
        unique(allRows.map(r => r.from)).forEach(v => filterFrom.add(new Option(v, v)));
        unique(allRows.map(r => r.source)).forEach(v => filterSource.add(new Option(v, v)));

        function getFilteredRows() {
            const c = filterChest.value.toLowerCase();
            const f = filterFrom.value.toLowerCase();
            const s = filterSource.value.toLowerCase();
            return allRows.filter(row =>
                (!c || row.chest.toLowerCase() === c) &&
                (!f || row.from.toLowerCase() === f) &&
                (!s || row.source.toLowerCase() === s)
            );
        }

        function renderTable() {
            const rows = getFilteredRows();
            tbody.innerHTML = '';
            rows.forEach(({ chest, from, source }, index) => {
                const tr = document.createElement('tr');
                const numberCell = document.createElement('td');
                numberCell.textContent = (index + 1).toString();
                tr.appendChild(numberCell);
                [chest, from, source].forEach(text => {
                    const td = document.createElement('td');
                    td.textContent = text || '—';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            rowCount.textContent = `${rows.length} of ${allRows.length} rows.`;
        }

        function sortBySource() {
            allRows.sort((a, b) => {
                const result = a.source.localeCompare(b.source, undefined, { sensitivity: 'base' });
                return sourceSortAsc ? result : -result;
            });
            sourceHeader.textContent = `Source ${sourceSortAsc ? '▲' : '▼'}`;
            sourceSortAsc = !sourceSortAsc;
            renderTable();
        }

        sourceHeader.addEventListener('click', sortBySource);
        filterChest.addEventListener('change', renderTable);
        filterFrom.addEventListener('change', renderTable);
        filterSource.addEventListener('change', renderTable);
        document.getElementById('reset-filters').addEventListener('click', () => {
            filterChest.value = '';
            filterFrom.value = '';
            filterSource.value = '';
            renderTable();
        });

        renderTable();
    </script>

</body>
</html>
