<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Table Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
        }
        
    </style>
</head>
<body>

    <h2>Chest Data Table</h2>

    <label for="data-file-input">Load chest data file:</label>
    <input type="file" id="data-file-input" accept=".txt" />

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Chest</th>
                <th>From</th>
                <th>Source</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Data rows generated by JavaScript -->
        </tbody>
    </table>

    <p id="row-count"></p>

    <script>
        const tbody = document.getElementById('data-table-body');
        const rowCount = document.getElementById('row-count');
        const fileInput = document.getElementById('data-file-input');

        function parseLine(line) {
            const rawTokens = line.replace(/\t/g, '')
                                  .split(',')
                                  .map(token => token.trim())
                                  .filter(Boolean);

            const fromIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('from:'));
            const sourceIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('source:'));
            if (fromIndex === -1 || sourceIndex === -1) {
                return null;
            }

            const chest = rawTokens.slice(0, fromIndex).join(', ');
            const firstFromValue = rawTokens[fromIndex].replace(/^from:/i, '').trim();
            const fromExtra = rawTokens.slice(fromIndex + 1, sourceIndex).join(', ');
            let from = [firstFromValue, fromExtra].filter(Boolean).join(', ').trim();

            const firstSourceValue = rawTokens[sourceIndex].replace(/^source:/i, '').trim();
            const sourceExtraStart = sourceIndex + 1;
            
            let source = firstSourceValue;
            let extraAfterSource = [];
            
            // If from is empty and there's content after source, use first token as from
            if (!from && rawTokens.length > sourceExtraStart) {
                from = rawTokens[sourceExtraStart];
                extraAfterSource = rawTokens.slice(sourceExtraStart + 1);
            } else if (rawTokens.length > sourceExtraStart) {
                extraAfterSource = rawTokens.slice(sourceExtraStart);
            }
            
            if (extraAfterSource.length > 0) {
                source = [source, ...extraAfterSource].filter(Boolean).join(', ').trim();
            }

            // If chest is empty and source has comma, discard after comma
            if (!chest && source.includes(',')) {
                source = source.split(',')[0].trim();
            }

            return { chest, from, source };
        }

        function renderRows(rows) {
            tbody.innerHTML = '';
            if (rows.length === 0) {
                rowCount.textContent = 'No valid rows found in the file.';
                return;
            }
            rows.forEach(({ chest, from, source }, index) => {
                const tr = document.createElement('tr');
                const numberCell = document.createElement('td');
                numberCell.textContent = (index + 1).toString();
                tr.appendChild(numberCell);
                [chest, from, source].forEach(text => {
                    const td = document.createElement('td');
                    td.textContent = text || '—';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            rowCount.textContent = `${rows.length} rows loaded.`;
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) {
                rowCount.textContent = 'No file selected.';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text
                    .split(/\r?\n/)
                    .map(line => line.trim())
                    .filter(Boolean)
                    .map(parseLine)
                    .filter(Boolean);
                renderRows(rows);
            };
            reader.onerror = function() {
                rowCount.textContent = 'Error reading file.';
            };
            reader.readAsText(file);
            rowCount.textContent = `Loading ${file.name}...`;
        }

        fileInput.addEventListener('change', handleFile);
        rowCount.textContent = 'Select a .txt file to parse.';
    </script>

</body>
</html>
