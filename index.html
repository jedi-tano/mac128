        function parseLine(line) {
            const rawTokens = line.split(',').map(token => token.trim());
            const fromIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('from:'));
            const sourceIndex = rawTokens.findIndex(token => token.toLowerCase().startsWith('source:'));

            const chestTokens = rawTokens.slice(0, fromIndex === -1 ? rawTokens.length : fromIndex);
            const chest = chestTokens.filter(Boolean).join(', ');

            let from = '';
            if (fromIndex !== -1) {
                const firstFromValue = rawTokens[fromIndex].replace(/^from:/i, '').trim();
                const nextTokens = rawTokens.slice(fromIndex + 1, sourceIndex === -1 ? rawTokens.length : sourceIndex);
                from = [firstFromValue, ...nextTokens].filter(Boolean).join(', ').trim();
            }

            let source = '';
            if (sourceIndex !== -1) {
                const firstSourceValue = rawTokens[sourceIndex].replace(/^source:/i, '').trim();
                const remainingTokens = rawTokens.slice(sourceIndex + 1);
                source = [firstSourceValue, ...remainingTokens].filter(Boolean).join(', ').trim();
            }

            return { chest, from, source };
        }

        const rows = rawData
            .split(/\r?\n/)
            .map(line => line.trim())
            .filter(Boolean)
            .map(parseLine);

        // Sort rows by the Source column in ascending order
        rows.sort((a, b) => a.source.localeCompare(b.source, undefined, { sensitivity: 'base' }));

        const tbody = document.getElementById('data-table-body');
        const rowCount = document.getElementById('row-count');

        rows.forEach(({ chest, from, source }) => {
            const tr = document.createElement('tr');
            [chest, from, source].forEach(text => {
                const td = document.createElement('td');
                td.textContent = text || '—';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        rowCount.textContent = `${rows.length} rows displayed.`;
