<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Table Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h2>Sample Table</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Value</th>
        </tr>
        <tr>
            <td>Item A</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Item B</td>
            <td>20</td>
        </tr>
    </table>

    <p>Last updated: 2026-04-17 09:20:02 PST</p>

</body>
</html>
